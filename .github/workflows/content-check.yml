name: Content Check

on:
  push:
    paths:
      - 'content/**'
      - 'scripts/**'
      - '.github/workflows/content-check.yml'
  pull_request:
    paths:
      - 'content/**'
      - 'scripts/**'
  workflow_dispatch:

jobs:
  validate-json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install deps
        run: pip install -r scripts/requirements.txt
      - name: Validate content against JSON Schema
        run: python scripts/validate_content.py
      - name: Check manifest is in sync
        run: python scripts/generate_manifest.py --check

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check links with lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >-
            --verbose
            --no-progress
            --max-concurrency 4
            --accept 200,206,429
            './**/*.md'
          fail: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
